name = "pulse-data-worker"
main = "index.js"
compatibility_date = "2026-03-17"
workers_dev = true
preview_urls = false

[vars]
ENVIRONMENT = "production"
DATA_REFRESH_TTL_SECONDS = "14400"
DATA_STALE_TTL_SECONDS = "86400"

[triggers]
crons = ["0 */4 * * *"]

# Production scale requires KV. Create namespaces, then uncomment:
# npx wrangler kv namespace create METRICS_CACHE
# npx wrangler kv namespace create METRICS_CACHE --preview
#
# [[kv_namespaces]]
# binding = "METRICS_CACHE"
# id = "replace-with-production-kv-id"
# preview_id = "replace-with-preview-kv-id"
