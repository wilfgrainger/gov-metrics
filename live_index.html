<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PULSE — Redirecting…</title>
    <meta name="theme-color" content="#000000" />
    <meta http-equiv="refresh" content="0; url=/gov-metrics/" />
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --fg: #111111;
        --accent: #5b21b6;
        --border: #111111;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        background: var(--bg);
        color: var(--fg);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      .notice {
        width: min(680px, 100%);
        border: 2px solid var(--border);
        padding: clamp(14px, 2.4vw, 24px);
        box-shadow: 6px 6px 0 #000;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.1rem, 3.2vw, 1.5rem);
        line-height: 1.2;
      }

      p {
        margin: 0;
        font-size: clamp(0.95rem, 2.4vw, 1.05rem);
        line-height: 1.5;
        overflow-wrap: anywhere;
      }

      a {
        color: var(--accent);
        font-weight: 600;
      }
    </style>
    <script>
      (function () {
        const targetPath = "/gov-metrics/";
        const currentPath = window.location.pathname;
        const targetUrl = new URL(targetPath + window.location.search + window.location.hash, window.location.origin);

        if (currentPath !== targetPath) {
          window.location.replace(targetUrl.toString());
        }
      })();
    </script>
  </head>
  <body>
    <main class="notice" role="status" aria-live="polite">
      <h1>Redirecting to the current dashboard…</h1>
      <p>
        If you are not redirected automatically,
        <a href="/gov-metrics/">open dashboard</a>.
      </p>
    </main>
  </body>
</html>
