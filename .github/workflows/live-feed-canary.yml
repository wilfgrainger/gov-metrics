name: Live Feed Canary

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run live feed canary
        env:
          NEXT_PUBLIC_CF_WORKER_URL: ${{ secrets.NEXT_PUBLIC_CF_WORKER_URL }}
          WORKER_REFRESH_SECRET: ${{ secrets.WORKER_REFRESH_SECRET }}
        run: npm run test:live
